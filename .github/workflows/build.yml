name: Build Patched YouTube Plus

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted YouTube IPA"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "YTLite version (from dayanch96/YTLite/releases)"
        default: "5.2"
        required: true
        type: string

      enable_youpip:
        description: "Integrate YouPiP (Picture-in-Picture)"
        type: boolean
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD (Ultra HD)"
        type: boolean
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        default: false

      enable_ytabc:
        description: "Integrate YTABConfig"
        type: boolean
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        default: false

      display_name:
        description: "App display name"
        default: "YouTube"
        type: string

      bundle_id:
        description: "Bundle ID"
        default: "com.google.ios.youtube"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Patched IPA
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # ── Checkout (our patcher source) ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download YTLite .deb ──
      - name: Download YTLite deb
        run: |
          deb_url="https://github.com/dayanch96/YTLite/releases/download/v${{ inputs.tweak_version }}/com.dvntm.ytlite_${{ inputs.tweak_version }}_iphoneos-arm.deb"
          wget "$deb_url" --no-verbose -O ytplus.deb

      # ── Download and validate YouTube IPA ──
      - name: Download YouTube IPA
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Not a valid IPA. Type: $file_type"
            exit 1
          fi

      # ── Compile YTLitePatcher (standalone dylib, no Theos needed) ──
      - name: Compile YTLitePatcher
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -arch arm64e \
            -dynamiclib \
            -isysroot "$SDK" \
            -miphoneos-version-min=13.0 \
            -framework Foundation \
            -framework UIKit \
            -fobjc-arc \
            -O2 \
            -o YTLitePatcher.dylib \
            Tweak_Standalone.m
          codesign -f -s - YTLitePatcher.dylib
          echo "Built YTLitePatcher.dylib ($(wc -c < YTLitePatcher.dylib) bytes)"

      # ══════════════════════════════════════════════════════
      # Optional tweaks (only run if any integration enabled)
      # ══════════════════════════════════════════════════════

      - name: Install Theos dependencies
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: brew install make ldid dpkg

      - name: Set PATH and THEOS env
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        id: theos
        uses: actions/cache@v5
        env:
          cache-name: theos_cache_9bc7340
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Clone YouTubeHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: |
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            cd $THEOS/include/YouTubeHeader && git pull
          else
            cd $THEOS/include && git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          fi
          if [ "${{ inputs.enable_demc }}" = "true" ]; then
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi

      - name: Clone PSHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: |
          if [ -d "$THEOS/include/PSHeader" ]; then
            cd $THEOS/include/PSHeader && git pull
          else
            cd $THEOS/include && git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          fi

      # ── Clone optional tweaks ──
      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip || inputs.enable_ytuhd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git

      # ── Build optional tweaks ──
      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: cd YouPiP && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../youpip.deb

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: cd YTUHD && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../ytuhd.deb

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: cd Return-YouTube-Dislikes && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../ryd.deb

      - name: Build YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: cd YTABConfig && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../ytabc.deb

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: cd YouQuality && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../yq.deb

      - name: Build YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: cd YouGroupSettings && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../ygs.deb

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip || inputs.enable_ytuhd }}
        run: cd YTVideoOverlay && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../ytvo.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: cd DontEatMyContent && make clean package DEBUG=0 FINALPACKAGE=1 && mv packages/*.deb ../demc.deb

      # ── Clone Safari extension (always) ──
      - name: Clone Open in YouTube Safari extension
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension
          cd OpenYoutubeSafariExtension
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ..

      # ══════════════════════════════════════════════════════
      # Package everything into a single IPA
      # ══════════════════════════════════════════════════════

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Inject tweaks into IPA
        run: |
          # Always include: YTLite + our patcher + Safari extension
          tweaks="ytplus.deb YTLitePatcher.dylib OpenYoutubeSafariExtension.appex"

          # Add any optional tweak debs that were built
          for f in youpip.deb ytuhd.deb ryd.deb ytabc.deb yq.deb ygs.deb ytvo.deb demc.deb; do
            [ -f "$f" ] && tweaks="$tweaks $f"
          done

          echo "Injecting: $tweaks"
          cyan -i youtube.ipa \
               -o YouTubePlus_Patched_${{ inputs.tweak_version }}.ipa \
               -uwef $tweaks \
               -n "${{ inputs.display_name }}" \
               -b "${{ inputs.bundle_id }}"

      # ── Upload ──
      - name: Upload to Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: patched-${{ github.run_number }}
          name: "YouTubePlus Patched v${{ inputs.tweak_version }} (#${{ github.run_number }})"
          files: YouTubePlus_Patched_${{ inputs.tweak_version }}.ipa
          draft: true

      - name: Done
        run: echo "::notice::Release at https://github.com/${{ github.repository }}/releases"
